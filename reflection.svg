<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Wall on the left -->
  <rect x="7" y="8" width="7" height="48" rx="3" fill="#f59e0b"/>
  <!-- Incoming ball from the right -->
  <circle cx="54" cy="42" r="6" fill="#60a5fa"/>
  <!-- Incoming path: right to wall -->
  <line x1="48" y1="42" x2="16" y2="42" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 3"/>
  <!-- Bounced path: wall upward-right -->
  <line x1="14" y1="42" x2="36" y2="14" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 3"/>
  <!-- Arrowhead on bounce -->
  <polygon points="36,14 28,20 34,28" fill="#60a5fa"/>
</svg>
